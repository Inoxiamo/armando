name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-container:
    name: Test In Linux Container
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref_name == 'master' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Build test runner image
        run: docker build -f docker/test-runner.Dockerfile -t armando-test-runner .

      - name: Run unit, integration, and functional tests
        run: |
          chmod +x scripts/ci/run-container-tests.sh
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            armando-test-runner \
            bash scripts/ci/run-container-tests.sh "ci-${{ github.sha }}"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armando-test-artifacts
          path: target/test-artifacts

      - name: Upload Linux release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: armando-linux-bundle
          path: |
            target/dist/armando-ci-*.tar.gz
            target/dist/armando-ci-*.tar.gz.sha256

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armando-coverage-artifacts
          path: |
            target/test-artifacts/coverage/*
            target/test-artifacts/sonar/*

  cross-platform-check:
    name: Cross-Platform Check (${{ matrix.os }})
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref_name == 'master' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cargo check all targets
        run: cargo check --locked --all-targets
