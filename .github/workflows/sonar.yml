name: Sonar

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

jobs:
  sonar:
    name: Sonar Scan
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref_name == 'master' }}
    runs-on: ubuntu-latest

    steps:
      - name: Skip when Sonar secrets are missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "Skipping Sonar scan because SONAR_TOKEN or SONAR_HOST_URL is not configured."

      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, llvm-tools-preview

      - name: Cache Rust build artifacts
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: Swatinem/rust-cache@v2

      - name: Generate clippy and coverage reports
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        shell: bash
        run: |
          chmod +x scripts/quality/export-clippy-sonar-report.sh
          chmod +x scripts/quality/export-rust-coverage.sh
          scripts/quality/export-clippy-sonar-report.sh
          scripts/quality/export-rust-coverage.sh

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
