name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version label for manual builds"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: armando
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_name: armando
            archive_type: tar.gz
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            binary_name: armando
            archive_type: tar.gz
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            binary_name: armando.exe
            archive_type: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix bundle
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          VERSION="${{ github.event.inputs.version || github.ref_name || 'dev' }}"
          scripts/package-release.sh \
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
            "${{ matrix.target }}" \
            "${VERSION}"

      - name: Create Unix checksum
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name || 'dev' }}"
          FILE="target/dist/${{ env.APP_NAME }}-${VERSION}-${{ matrix.target }}.tar.gz"
          sha256sum "${FILE}" > "${FILE}.sha256"

      - name: Package Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } elseif ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $bundle = "target/dist/${env:APP_NAME}-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$bundle/configs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundle/themes" | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundle/locales" | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundle/assets" | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundle/scripts" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$bundle/"
          Copy-Item "README.md" "$bundle/"
          Copy-Item "configs/default.yaml" "$bundle/configs/default.yaml"
          Copy-Item "themes/*.yaml" "$bundle/themes/"
          Copy-Item "locales/*.yaml" "$bundle/locales/"
          Copy-Item "assets/*" "$bundle/assets/" -Recurse
          Copy-Item "scripts/release-install.ps1" "$bundle/scripts/install.ps1"
          Compress-Archive -Path "$bundle/*" -DestinationPath "$bundle.zip" -Force

      - name: Create Windows checksum
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } elseif ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $file = "target/dist/$env:APP_NAME-$version-${{ matrix.target }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
          Set-Content -Path "$file.sha256" -Value "$hash  $(Split-Path -Leaf $file)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}
          path: |
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.tar.gz
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.zip
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.tar.gz.sha256
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.zip.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.tar.gz
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.zip
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.tar.gz.sha256
            target/dist/${{ env.APP_NAME }}-*-${{ matrix.target }}.zip.sha256
