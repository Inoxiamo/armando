[package]
name = "test-popup-ai"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.27"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
global-hotkey = "0.5"
arboard = "3.3"
anyhow = "1.0"
dirs = "5.0"
log = "0.4"
env_logger = "0.11"
time = { version = "0.3", features = ["formatting", "parsing"] }
