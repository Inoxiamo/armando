auto_read_selection: true
default_backend: gemini
theme:
  name: default-dark
  path: null
ui:
  language: en
  window_height: 640.0
history:
  enabled: false
logging:
  enabled: true
update:
  beta: true
rag:
  enabled: false
  mode: vector
  documents_folder: null
  vector_db_path: .armando-rag.sqlite3
  max_retrieved_docs: 4
  chunk_size: 1200
  embedding_backend: null
  embedding_model: null
  runtime_override: default
gemini:
  api_key: YOUR_GEMINI_API_KEY
  model: gemini-1.5-flash
chatgpt:
  api_key: YOUR_OPENAI_API_KEY
  model: gpt-4o-mini
claude:
  api_key: YOUR_ANTHROPIC_API_KEY
  model: claude-3-5-sonnet-latest
ollama:
  base_url: http://localhost:11434
  model: gemma3:1b
